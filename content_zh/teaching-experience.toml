title = "实训课程"
# subtitle = "助教"
# date = "2024"
content = "曾担任工程训练中心实训指导教师，主讲 3D 打印、数控线切割、数控车床 等制造工艺课程。这段经历让我深刻理解了“从图纸到实物”的完整链路——不仅要教会学生操作面板上的按钮，更要帮他们建立工艺思维：什么时候该用增材制造（3D 打印），什么时候该用减材制造（车削/线切割），以及如何根据材料特性和精度要求选择合适的加工方案。这段讲台经历也反向塑造了我的工程习惯：在后来主导非标设备研发时，我总会多问自己一句——“如果操作者是一名初学者，这个交互逻辑是否足够直观？”。"
tags = ["3D打印", "线切割", "数控车床"]

[[items]]
title = "竞赛加工指导教师"
content = "担任全国大学生工程训练综合能力竞赛及机械创新设计大赛样件加工指导教师，负责学生参赛作品中所有机械样件的加工工艺制定、数控编程与实操加工、装配协调与现场调试等全流程指导工作。指导内容涵盖：根据设计图纸评审可制造性（DFM），选用适宜的加工工艺（3D打印、数控铣削、线切割等）；指导学生完成从三维模型到G代码的编程转换；上机操作中的刀具路径优化、切削参数设定；以及装配阶段的干涉检查、公差配合修整和功能调试。所指导的学生团队在多届赛事中荣获省级及以上奖项。"
tags = ["数控车床", "线切割", "加工中心", "钳工"]
image = "/program/竞赛指导.jpg"
