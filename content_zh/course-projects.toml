description = "作为博士课题组主研人员，搭建了基于OCT的激光焊接熔深实时监测系统，开发涵盖多模块的在线监测软件。同时，与某单位合作开发训练伤足踝预警系统及心率监测系统，并顺利结题。曾担任重庆博迈科技有限公司项目负责人，设计开发了多款汽车外观塑料件的热铆、热板及超声波焊接设备，涵盖从机械结构设计、运动控制到工艺优化的完整开发流程。"

