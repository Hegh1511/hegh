[[items]]
title = "某汽车尾箱塑料件卡口焊接工装设计"
subtitle = "重庆博迈科技有限公司 · 项目负责人"
content = "针对客户对尾箱塑料件卡口焊接精度与强度的要求，主导设计并制造了专用热板焊接工装。该设备以 PLC 为控制核心，集成了运动控制、温度闭环与计数统计等模块。在工艺上，采用独立温控系统对每个卡扣实施精准熔化，并借助双气缸驱动胎膜实现热压紧配合，确保了焊接的牢固性与一致性。同时，设备加装安全光栅与双启动按钮，构建了双重安全防护机制。最终，该工装实现了卡口的准确定位与稳定焊接，显著提升了工艺集成度，获得客户的高度认可。"
image = "/program/尾箱覆盖件卡口焊接方案.png"
image_alt = "尾箱覆盖件卡口焊接方案"

[[items]]
title = "某汽车杯托超声波焊接工装改造设计"
subtitle = "重庆博迈科技有限公司 · 项目负责人"
content = "针对某车型杯托组件的超声波焊接需求，对现有老旧超声波设备进行了自动化改造升级。首先，依据杯托及其附件的不规则轮廓，设计了随形仿形胎膜实现精确初定位，并选用亚德客（Airtac）旋压气缸对工件施加稳定压紧力，确保焊接过程中工件无窜动。在工装与原设备的衔接上，采用圆柱销过渡定位方案，实现了新制工装与超声波主机头的快速装换与高精度对中。最后，重新标定焊接下落行程及触发位置，匹配设备时序，成功实现杯托的全自动超声波焊接。改造后设备运行稳定，焊接轨迹一致性好，有效降低了客户设备采购成本。"
image = "/program/杯托超声波焊接方案.bmp"
image_alt = "杯托超声波焊接方案"

[[items]]
title = "魔术带切断设备"
subtitle = "重庆博迈科技有限公司 · 项目负责人"
content = "针对自粘魔术贴在使用中面临的多人共享、长度/深度调节不便等要求，主导设计并制造了智能裁切设备。在送料端，采用PLC协同步进电机与气缸的方案，通过精确控制步进电机转角实现魔术贴的定长出料，同时利用气缸执行裁切动作，确保送料与切断动作时序精准匹配。在裁切深度调节方面，通过可调气缸行程与快换刀片机构的组合设计，实现了魔术贴上下层（毛面/勾面）的独立裁切深度控制，可快速适应不同厚度规格的产品。设备操作界面简洁，支持参数快捷调用，有效满足了产线上多人、多规格频繁切换的使用场景，显著提升了裁切效率与一致性。"
image = "/program/魔术贴方案.png"
image_alt = "魔术贴方案"
