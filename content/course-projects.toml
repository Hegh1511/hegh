type = "card"
title = "Project Experience"
description = "As a core researcher in my doctoral research group, I built an OCT-based real-time laser-welding penetration monitoring system and developed online monitoring software with multiple functional modules. I also collaborated with an external organization to develop a foot-and-ankle training-injury early-warning system and a heart-rate monitoring system, both successfully completed. Previously, as a project manager at Chongqing Bomai Technology Co., Ltd., I designed and developed hot-riveting, hot-plate, and ultrasonic-welding equipment for multiple automotive exterior plastic parts, covering the complete development process from mechanical-structure design and motion control to process optimization."

